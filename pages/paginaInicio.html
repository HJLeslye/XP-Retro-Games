<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Games Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <!-- Top Navbar -->
  <nav class="navbar navbar-dark navbar-custom fixed-top d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center" href="#">
        <img src="Img/Logos/logos.png" alt="Logo" height="60">
      </a>
    </div>
    <!-- Buscador -->
    <form class="d-flex flex-grow-1 mx-3" style="max-width: 600px;">
      <input class="form-control me-2" type="search" placeholder="Buscar juegos..." aria-label="Search">
    </form>
    <!-- Iconos derecha -->
    <div id="navbar-icons" class="d-flex align-items-center"></div>
  </nav>

  <!-- Modales -->
  <div class="modal fade" id="modalAmigos" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-header"><h5 class="modal-title">Amigos</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body">Contenido amigos</div></div></div>
  </div>
  <div class="modal fade" id="modalNotificaciones" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-header"><h5 class="modal-title">Notificaciones</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body">Contenido notificaciones</div></div></div>
  </div>
  <div class="modal fade" id="modalFavoritos" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content bg-dark text-white"><div class="modal-header"><h5 class="modal-title">Favoritos</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div><div class="modal-body">Contenido favoritos</div></div></div>
  </div>

   <!-- Sidebar -->
   <div class="sidebar d-flex flex-column align-items-start">
    <a href="#"><i class="bi bi-house"></i><span class="text">Inicio</span></a>
    <a href="#"><i class="bi bi-star"></i><span class="text">Favoritos</span></a>
    <a href="#"><i class="bi bi-people"></i><span class="text">Multijugador</span></a>
    <a href="#"><i class="bi bi-fire"></i><span class="text">Destacados</span></a>
    <a href="#"><i class="bi bi-dribbble"></i><span class="text">Deportes</span></a>
    <a href="#"><i class="bi bi-circle"></i><span class="text">Billar</span></a>
    <a href="#"><i class="bi bi-cash"></i><span class="text">Apuestas</span></a>
    <a href="#"><i class="bi bi-car-front"></i><span class="text">Conducir</span></a>
    <a href="#"><i class="bi bi-crosshair"></i><span class="text">Shooters</span></a>
    <a href="#"><i class="bi bi-columns-gap"></i><span class="text">Puzzle</span></a>
    <a href="#"><i class="bi bi-music-note"></i><span class="text">Música</span></a>
    <div class="mt-auto w-100">
      <a href="#"><i class="bi bi-envelope"></i><span class="text">Contáctanos</span></a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Sesión de usuario (cambiar a false para probar sin login)
    const isLoggedIn = false;

    const navbarIcons = document.getElementById('navbar-icons');

    if (isLoggedIn) {
      navbarIcons.innerHTML = `
        <i class="bi bi-people mx-2" title="Amigos" data-bs-toggle="modal" data-bs-target="#modalAmigos"></i>
        <i class="bi bi-bell mx-2" title="Notificaciones" data-bs-toggle="modal" data-bs-target="#modalNotificaciones"></i>
        <i class="bi bi-heart mx-2" title="Favoritos" data-bs-toggle="modal" data-bs-target="#modalFavoritos"></i>
        <div class="dropdown ms-3">
          <a class="dropdown-toggle text-white profile-dropdown" href="#" role="button" data-bs-toggle="dropdown">
            <img src="/ruta/perfil.png" alt="Perfil">
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="#">Perfil</a></li>
            <li><a class="dropdown-item" href="#">Cerrar sesión</a></li>
          </ul>
        </div>
      `;
    } else {
      navbarIcons.innerHTML = `
        <i class="bi bi-people mx-2" title="Amigos" data-bs-toggle="modal" data-bs-target="#modalAmigos"></i>
        <button class="btn btn-outline-light btn-sm ms-2">Iniciar sesión</button>
      `;
    }
  </script>
</body>
</html>
