<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Perfil de Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #1e103f;
      color: white;
    }

    .profile-header {
      background: url('https://i.imgur.com/zOUJwYB.png') no-repeat center center;
      background-size: cover;
      height: 200px;
      position: relative;
    }

    .profile-header .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .profile-pic {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #fff;
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 2;
    }

    .profile-info {
      position: absolute;
      left: 120px;
      top: 30px;
      z-index: 2;
    }

    .section {
      background-color: #2c1e5f;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .form-control, .form-select {
      background-color: #3a2b7a;
      color: white;
      border: none;
    }

    .form-control::placeholder {
      color: #ccc;
    }

    .btn-save {
      background-color: #6c5ce7;
      border: none;
    }
  </style>
</head>
<body>

  <div class="profile-header">
    <div class="overlay"></div>
    <img src="https://i.imgur.com/3k4zQ10.png" alt="Perfil" class="profile-pic">
    <div class="profile-info text-white">
      <h5>Usuario69958 <small class="text-muted">#16930</small></h5>
      <p>#Bibliografía</p>
    </div>
  </div>

  <div class="container my-4">
    <div class="row">
      <!-- Columna Izquierda -->
      <div class="col-md-4">
        <div class="section text-center">
          <h5>Logros</h5>
          <p>0</p>
        </div>
        <div class="section text-center">
          <p><strong>Rango:</strong> Leyenda pixelada</p>
          <p><strong>Horas:</strong> 20h</p>
          <p><strong>Miembro:</strong> 4 días</p>
        </div>
      </div>

      <!-- Columna Derecha -->
      <div class="col-md-8">
        <div class="section">
          <h5>Favoritos</h5>
          <img src="https://i.imgur.com/ltsXYVA.png" alt="Favorito" class="img-fluid rounded">
        </div>

        <div class="section">
          <h5>Me gusta</h5>
          <img src="https://i.imgur.com/ltsXYVA.png" alt="Me gusta" class="img-fluid rounded">
        </div>

        <div class="section">
          <h5>Datos del perfil</h5>
          <input type="text" class="form-control mb-2" placeholder="Usuario">
          <textarea class="form-control" placeholder="Descripción de tu perfil"></textarea>
        </div>

        <div class="section">
          <h5>Datos del usuario</h5>
          <div class="row g-2">
            <div class="col-md-6">
              <input type="email" class="form-control" placeholder="Correo electrónico">
            </div>
            <div class="col-md-6">
              <input type="password" class="form-control" placeholder="Cambiar contraseña">
            </div>
            <div class="col-md-6">
              <input type="password" class="form-control" placeholder="Verificar contraseña">
            </div>
            <div class="col-md-6">
              <select class="form-select">
                <option>Región</option>
              </select>
            </div>
            <div class="col-md-6">
              <select class="form-select">
                <option>País</option>
              </select>
            </div>
            <div class="col-md-6">
              <select class="form-select">
                <option>Género</option>
              </select>
            </div>
            <div class="col-md-6">
              <input type="text" class="form-control" placeholder="Fecha Nac. DD/MM/AAAA">
            </div>
          </div>
          <button class="btn btn-save mt-3">Guardar</button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
